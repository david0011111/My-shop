<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Product</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
        img { max-width: 100%; border-radius: 8px; }
        h1 { color: #333; }
        .price { font-size: 1.5rem; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/300" alt="Product Image">
        <h1>Cool Product Name</h1>
        <p>This is a brief, catchy description of what you're selling. Make them want it!</p>
        <div class="price">$19.99</div>
        <a href="#" class="btn">Buy Now</a>
    </div>
</body>
</html>
